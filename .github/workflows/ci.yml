name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Shellcheck helper scripts
        run: shellcheck scripts/*.sh

      - name: Validate required workflow files
        run: |
          set -euo pipefail
          test -f .github/workflows/dependency-remediation.yml
          test -f .github/workflows/dependency-scan.yml
          test -f examples/caller-basic.yml
          test -f examples/caller-custom.yml
          test -f examples/caller-monorepo.yml
