name: Dependency Scan

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
      minimum-severity:
        required: false
        type: string
        default: high
      upload-artifacts:
        required: false
        type: boolean
        default: false
      security-workflows-repository:
        required: false
        type: string
        default: opsbento/security-workflows
      security-workflows-ref:
        required: false
        type: string
        default: main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      SECURITY_WORKFLOWS_DIR: /tmp/security-workflows-source
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Fetch security workflow helpers
        run: |
          set -euo pipefail
          git clone --no-checkout "https://github.com/${{ inputs['security-workflows-repository'] }}.git" "$SECURITY_WORKFLOWS_DIR"
          git -C "$SECURITY_WORKFLOWS_DIR" fetch --depth 1 origin "${{ inputs['security-workflows-ref'] }}"
          git -C "$SECURITY_WORKFLOWS_DIR" checkout --detach FETCH_HEAD

      - name: Install Syft and Grype
        run: |
          "$SECURITY_WORKFLOWS_DIR/scripts/install-anchore-tools.sh"

      - name: Generate SBOM and scan
        id: scan
        continue-on-error: true
        run: |
          "$SECURITY_WORKFLOWS_DIR/scripts/run-dependency-scan.sh" "${{ inputs['working-directory'] }}" "${{ inputs['minimum-severity'] }}" reports

      - name: Print scan result
        if: always()
        run: |
          "$SECURITY_WORKFLOWS_DIR/scripts/print-dependency-scan.sh" reports/findings.json

      - name: Upload scan artifacts
        if: always() && inputs['upload-artifacts'] == true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dependency-scan-${{ github.run_id }}
          path: reports/*

      - name: Fail on scan threshold
        if: steps.scan.outcome == 'failure'
        run: exit 1
